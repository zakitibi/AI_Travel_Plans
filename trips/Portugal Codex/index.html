<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🗺 🇵🇹 Portugália 2026 – Portugal Codex</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-top">
        <div>
          <h1 id="hero-title"></h1>
          <p id="hero-subtitle"></p>
        </div>
        <div class="flight-pills" id="flight-pills"></div>
      </div>
      <div class="route" id="route"></div>
    </header>

    <nav class="tabs" id="tabs"></nav>

    <main id="views"></main>
  </div>

  <script src="./trip-data.js"></script>
  <script>
    const tabs = [
      { id: "overview", label: "📋 Áttekintés" },
      ...tripData.days.map((day) => ({ id: day.id, label: day.tabLabel })),
      { id: "restaurants", label: "🍽 Éttermek" },
      { id: "sights", label: "🏛 Látnivalók" },
      { id: "practical", label: "🧳 Praktikus" }
    ];

    const heroTitle = document.getElementById("hero-title");
    const heroSubtitle = document.getElementById("hero-subtitle");
    const flightPills = document.getElementById("flight-pills");
    const route = document.getElementById("route");
    const tabsEl = document.getElementById("tabs");
    const views = document.getElementById("views");

    heroTitle.textContent = tripData.title;
    heroSubtitle.textContent = `${tripData.subtitle} · Frissítve: ${tripData.updatedAt}`;

    tripData.flights.forEach((flight) => {
      const pill = document.createElement("div");
      pill.className = "flight-pill";
      pill.innerHTML = `
        <strong>${flight.title}</strong>
        <div>${flight.body}</div>
        <div>${flight.links.map((link) => `<a href="${link.url}" target="_blank" rel="noreferrer">${link.label}</a>`).join(" · ")}</div>
      `;
      flightPills.appendChild(pill);
    });

    tripData.route.forEach((item) => {
      const node = document.createElement("span");
      if (item.separator) {
        node.className = "route-sep";
        node.textContent = item.separator;
      } else {
        node.className = `route-stop ${item.cls}`;
        node.textContent = item.label;
      }
      route.appendChild(node);
    });

    function renderOverview() {
      return `
        <section class="view is-active" data-view="overview">
          <div class="overview-grid">
            <div class="card">
              <h2 class="section-title">📅 Útvonal áttekintés</h2>
              <div class="timeline">
                ${tripData.days.map((day) => `
                  <article class="timeline-item">
                    <div class="timeline-meta">
                      <div class="timeline-day">${day.dayLabel} · ${day.dateLabel}</div>
                      <div class="timeline-stay">${day.stay}</div>
                    </div>
                    <h3>${day.title}</h3>
                    <ul class="timeline-list">
                      ${day.bullets.map((item) => `<li>${item}</li>`).join("")}
                    </ul>
                  </article>
                `).join("")}
              </div>
            </div>
            <div class="stack">
              <section class="card">
                <h2 class="section-title">⚠️ Most fontos</h2>
                <ul class="badge-list">
                  ${tripData.overview.urgent.map((item) => `<li><span class="badge gold">FOGLALÁS</span><strong>${item}</strong></li>`).join("")}
                </ul>
              </section>
              <section class="card">
                <h2 class="section-title">💡 Szerkezeti megjegyzések</h2>
                <ul class="plain-list">
                  ${tripData.overview.notes.map((item) => `<li>${item}</li>`).join("")}
                </ul>
              </section>
            </div>
          </div>
        </section>
      `;
    }

    function renderDay(day) {
      return `
        <section class="view" data-view="${day.id}">
          <article class="day-card">
            <header class="day-header">
              <div class="day-header-top">
                <div class="day-label">${day.dayLabel}</div>
                <div class="day-date">${day.dateLabel}</div>
              </div>
              <h2>${day.title}</h2>
              <p class="day-subtitle">${day.subtitle}</p>
            </header>
            <div class="day-body">
              <div class="schedule">
                ${day.schedule.map((item) => `
                  <div class="schedule-row">
                    <div class="schedule-time">${item.time}</div>
                    <div>
                      <h3 class="schedule-title">${item.title}</h3>
                      <p class="schedule-detail">${item.detail}</p>
                      ${item.meta ? `<p class="schedule-meta">${item.meta}</p>` : ""}
                    </div>
                  </div>
                `).join("")}
              </div>
              <aside class="mini-block">
                <section class="card">
                  <h3>${day.stay}</h3>
                  <ul class="plain-list">
                    ${day.bullets.map((item) => `<li>${item}</li>`).join("")}
                  </ul>
                </section>
                <div class="note-box">${day.note}</div>
              </aside>
            </div>
          </article>
        </section>
      `;
    }

    function renderRestaurants() {
      return `
        <section class="view" data-view="restaurants">
          <h2 class="section-title">🍽 Éttermek</h2>
          <div class="group-grid">
            ${tripData.restaurants.map((group) => `
              <section class="card">
                <h3>${group.city}</h3>
                <div class="group-grid">
                  ${group.items.map((item) => `
                    <article class="list-card">
                      <h3><a href="${item.url}" target="_blank" rel="noreferrer">${item.name}</a></h3>
                      <p>${item.type}</p>
                      <div class="food-tags">${item.tags.map((tag) => `<span class="food-tag">${tag}</span>`).join("")}</div>
                      <p>${item.description}</p>
                      <div class="meta">${item.meta}</div>
                    </article>
                  `).join("")}
                </div>
              </section>
            `).join("")}
          </div>
        </section>
      `;
    }

    function renderSights() {
      return `
        <section class="view" data-view="sights">
          <h2 class="section-title">🏛 Látnivalók</h2>
          <div class="group-grid">
            ${tripData.sights.map((sight) => `
              <article class="list-card">
                <h3>${sight.name}</h3>
                <p>${sight.detail}</p>
                <div class="meta">${sight.when} · ${sight.rating} · ${sight.price}</div>
              </article>
            `).join("")}
          </div>
        </section>
      `;
    }

    function renderPractical() {
      return `
        <section class="view" data-view="practical">
          <h2 class="section-title">🧳 Praktikus</h2>
          <div class="group-grid">
            ${tripData.practical.map((group) => `
              <article class="card">
                <h3>${group.title}</h3>
                <ul class="plain-list">
                  ${group.items.map((item) => `<li>${item}</li>`).join("")}
                </ul>
              </article>
            `).join("")}
          </div>
          <p class="footer-note">A <code>Portugal Codex</code> út most már külön adatfájlból és külön stílusból épül fel, így később az itinerary-t főleg a <code>trip-data.js</code> szerkesztésével tudod módosítani.</p>
        </section>
      `;
    }

    views.innerHTML = [
      renderOverview(),
      ...tripData.days.map(renderDay),
      renderRestaurants(),
      renderSights(),
      renderPractical()
    ].join("");

    tabsEl.innerHTML = tabs.map((tab, index) => `
      <button class="tab-btn ${index === 0 ? "is-active" : ""}" data-tab="${tab.id}">${tab.label}</button>
    `).join("");

    const tabButtons = Array.from(document.querySelectorAll(".tab-btn"));
    const viewEls = Array.from(document.querySelectorAll(".view"));

    function activateTab(id) {
      tabButtons.forEach((button) => button.classList.toggle("is-active", button.dataset.tab === id));
      viewEls.forEach((view) => view.classList.toggle("is-active", view.dataset.view === id));
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    tabsEl.addEventListener("click", (event) => {
      const button = event.target.closest(".tab-btn");
      if (!button) return;
      activateTab(button.dataset.tab);
    });
  </script>
</body>
</html>
